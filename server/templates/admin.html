<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>বই ম্যানেজমেন্ট — অ্যাডমিন</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1E3A5F;
    --gold: #C9A84C;
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --text: #1A1A2E;
    --text2: #5A5A72;
    --border: #E0DAD0;
    --danger: #D64045;
    --success: #2E7D32;
    --radius: 12px;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* Login */
  #login-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 20px;
  }
  .login-card {
    background: var(--surface); border-radius: 20px;
    padding: 48px 40px; width: 100%; max-width: 420px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12); text-align: center;
  }
  .login-card .book-icon { font-size: 64px; margin-bottom: 16px; }
  .login-card h1 { font-size: 24px; font-weight: 700; color: var(--navy); margin-bottom: 8px; }
  .login-card p { color: var(--text2); font-size: 14px; margin-bottom: 32px; }
  .login-card input {
    width: 100%; padding: 14px 16px; border: 2px solid var(--border);
    border-radius: var(--radius); font-size: 16px; outline: none;
    transition: border-color 0.2s; margin-bottom: 16px;
  }
  .login-card input:focus { border-color: var(--navy); }
  .btn-primary {
    width: 100%; padding: 14px; background: var(--navy); color: white;
    border: none; border-radius: var(--radius); font-size: 16px;
    font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-primary:hover { opacity: 0.9; }
  .btn-primary:active { transform: scale(0.98); }
  .error-msg { color: var(--danger); font-size: 14px; margin-top: 12px; }

  /* Main App */
  #main-app { display: none; }

  /* Header */
  .header {
    background: var(--navy); color: white; padding: 0 20px;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px; position: sticky; top: 0; z-index: 200;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .header h1 { font-size: 17px; font-weight: 700; }
  .header-right { display: flex; align-items: center; gap: 10px; }
  .btn-hamburger {
    background: none; border: none; color: white; cursor: pointer;
    width: 40px; height: 40px; display: flex; align-items: center;
    justify-content: center; border-radius: 8px; transition: background 0.2s;
    font-size: 22px;
  }
  .btn-hamburger:hover { background: rgba(255,255,255,0.15); }
  .btn-logout {
    background: rgba(255,255,255,0.15); color: white; border: none;
    padding: 7px 14px; border-radius: 8px; cursor: pointer;
    font-size: 13px; transition: background 0.2s;
  }
  .btn-logout:hover { background: rgba(255,255,255,0.25); }

  /* Sidebar Overlay */
  .sidebar-overlay {
    display: none; position: fixed; top: 60px; left: 0; right: 0;
    bottom: 0; background: rgba(0,0,0,0.4); z-index: 300;
    animation: fadeIn 0.2s;
  }
  .sidebar-overlay.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .sidebar {
    position: fixed; top: 60px; left: -320px; width: 300px;
    height: calc(100vh - 60px); background: var(--surface);
    border-right: 1px solid var(--border); z-index: 400;
    transition: left 0.3s ease; overflow-y: auto;
    box-shadow: 4px 0 20px rgba(0,0,0,0.15); padding: 16px 0;
  }
  .sidebar.open { left: 0; }
  .sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 14px; border-bottom: 1px solid var(--border); margin-bottom: 12px;
  }
  .sidebar-header h2 { font-size: 16px; font-weight: 700; color: var(--navy); }
  .btn-close-sidebar {
    background: none; border: none; cursor: pointer; font-size: 20px;
    color: var(--text2); width: 36px; height: 36px; display: flex;
    align-items: center; justify-content: center; border-radius: 8px;
  }
  .btn-close-sidebar:hover { background: var(--surface2); }

  .book-item {
    padding: 12px 16px; cursor: pointer; transition: background 0.15s;
    border-left: 3px solid transparent; display: flex; align-items: center; gap: 10px;
  }
  .book-item:hover { background: var(--surface2); }
  .book-item.active { background: #EAF0F8; border-left-color: var(--navy); }
  .book-item-color { width: 26px; height: 34px; border-radius: 4px; flex-shrink: 0; }
  .book-item-info { flex: 1; min-width: 0; }
  .book-item-title {
    font-size: 14px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .book-item-meta { font-size: 12px; color: var(--text2); }
  .badge-draft {
    font-size: 10px; background: #FFF3E0; color: #E65100;
    padding: 2px 7px; border-radius: 20px; font-weight: 600;
  }
  .btn-new-book {
    margin: 14px 16px 0; width: calc(100% - 32px); padding: 10px;
    background: var(--gold); color: var(--navy); border: none;
    border-radius: var(--radius); font-size: 14px; font-weight: 700;
    cursor: pointer; transition: opacity 0.2s;
  }
  .btn-new-book:hover { opacity: 0.85; }

  /* Full Page Content */
  .content {
    padding: 28px; max-width: 900px; margin: 0 auto; min-height: calc(100vh - 60px);
  }

  /* Welcome */
  .welcome-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 80px 20px; text-align: center;
  }
  .welcome-state .big-icon { font-size: 80px; margin-bottom: 24px; }
  .welcome-state h2 { font-size: 24px; color: var(--navy); margin-bottom: 12px; }
  .welcome-state p { color: var(--text2); font-size: 16px; line-height: 1.6; }

  /* Book Editor */
  .section-header {
    display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px;
  }
  .section-header h2 { font-size: 22px; font-weight: 700; color: var(--navy); }
  .card {
    background: var(--surface); border-radius: var(--radius);
    padding: 24px; box-shadow: var(--shadow); margin-bottom: 24px;
  }
  .card h3 { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: var(--text); }
  .form-row { margin-bottom: 16px; }
  .form-row label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .form-row input, .form-row textarea, .form-row select {
    width: 100%; padding: 12px 14px; border: 1.5px solid var(--border);
    border-radius: 8px; font-size: 15px; color: var(--text);
    background: var(--bg); outline: none; transition: border-color 0.2s; font-family: inherit;
  }
  .form-row input:focus, .form-row textarea:focus { border-color: var(--navy); background: white; }
  .form-row textarea { resize: vertical; min-height: 80px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .color-row { display: flex; align-items: center; gap: 12px; }
  .color-preview {
    width: 40px; height: 40px; border-radius: 8px;
    border: 2px solid var(--border); flex-shrink: 0;
  }
  .color-row input[type=color] { width: 50px; height: 40px; padding: 2px; cursor: pointer; border-radius: 8px; }

  .form-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 20px; }
  .btn-save {
    padding: 10px 24px; background: var(--navy); color: white; border: none;
    border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s;
  }
  .btn-save:hover { opacity: 0.9; }
  .btn-danger {
    padding: 10px 20px; background: #FFF0F0; color: var(--danger);
    border: 1.5px solid #FFCDD2; border-radius: 8px; font-size: 15px;
    font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .btn-danger:hover { background: #FFEBEE; }
  .btn-secondary {
    padding: 10px 20px; background: var(--surface2); color: var(--text);
    border: 1.5px solid var(--border); border-radius: 8px; font-size: 15px;
    font-weight: 600; cursor: pointer; transition: background 0.2s;
  }
  .btn-secondary:hover { background: var(--border); }

  /* Chapters */
  .chapter-list { display: flex; flex-direction: column; gap: 10px; }
  .chapter-row {
    background: var(--surface2); border-radius: 10px; padding: 14px 16px;
    display: flex; align-items: center; gap: 12px; cursor: pointer;
    transition: background 0.15s; border: 1.5px solid transparent;
  }
  .chapter-row:hover { background: #EAF0F8; border-color: #C0D0E8; }
  .chapter-row.active { background: #EAF0F8; border-color: var(--navy); }
  .chapter-num {
    width: 32px; height: 32px; background: var(--navy); color: white;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; flex-shrink: 0;
  }
  .chapter-title { font-size: 15px; font-weight: 600; flex: 1; }
  .chapter-actions { display: flex; gap: 6px; }
  .btn-icon {
    width: 32px; height: 32px; border: none; border-radius: 8px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
    transition: background 0.15s; background: transparent;
  }
  .btn-icon.edit:hover { background: #E3F2FD; }
  .btn-icon.del:hover { background: #FFEBEE; }

  /* Chapter Editor */
  .chapter-editor {
    background: var(--surface); border-radius: var(--radius);
    padding: 24px; box-shadow: var(--shadow); margin-top: 20px;
  }
  .chapter-editor textarea {
    width: 100%; min-height: 300px; padding: 16px;
    border: 1.5px solid var(--border); border-radius: 8px;
    font-size: 16px; line-height: 1.8; color: var(--text);
    background: var(--bg); resize: vertical;
    font-family: Georgia, 'Times New Roman', serif; outline: none;
    transition: border-color 0.2s;
  }
  .chapter-editor textarea:focus { border-color: var(--navy); background: white; }

  /* Toggle */
  .toggle-row { display: flex; align-items: center; gap: 12px; }
  .toggle { position: relative; width: 48px; height: 26px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: #ccc; border-radius: 26px; transition: 0.3s;
  }
  .toggle-slider::before {
    content: ''; position: absolute; height: 20px; width: 20px;
    left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s;
  }
  .toggle input:checked + .toggle-slider { background: var(--navy); }
  .toggle input:checked + .toggle-slider::before { transform: translateX(22px); }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; right: 24px; padding: 14px 20px;
    border-radius: 10px; font-size: 14px; font-weight: 600; color: white;
    z-index: 1000; transform: translateY(80px); opacity: 0;
    transition: all 0.3s ease; pointer-events: none;
  }
  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.success { background: var(--success); }
  .toast.error { background: var(--danger); }

  .empty-chapters { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty-chapters .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-chapters p { font-size: 14px; }

  /* Current book indicator in header */
  .current-book-name {
    font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.7);
    max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  @media (max-width: 768px) {
    .content { padding: 16px; }
    .form-grid { grid-template-columns: 1fr; }
    .sidebar { width: 280px; }
  }
</style>
</head>
<body>

<!-- Login -->
<div id="login-screen">
  <div class="login-card">
    <div class="book-icon">📚</div>
    <h1>অ্যাডমিন প্যানেল</h1>
    <p>বই ও অধ্যায় ম্যানেজ করুন</p>
    <input type="password" id="password-input" placeholder="পাসওয়ার্ড দিন..." onkeypress="if(event.key==='Enter')login()">
    <button class="btn-primary" onclick="login()">প্রবেশ করুন</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- Main App -->
<div id="main-app">
  <div class="header">
    <div class="header-left">
      <button class="btn-hamburger" onclick="toggleSidebar()" title="বই তালিকা">&#9776;</button>
      <h1>📚 বই ম্যানেজমেন্ট</h1>
      <span class="current-book-name" id="current-book-name"></span>
    </div>
    <div class="header-right">
      <button class="btn-logout" onclick="logout()">লগআউট</button>
    </div>
  </div>

  <!-- Sidebar Overlay -->
  <div class="sidebar-overlay" id="sidebar-overlay" onclick="closeSidebar()"></div>

  <!-- Sidebar Drawer -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>সব বই</h2>
      <button class="btn-close-sidebar" onclick="closeSidebar()">&#10005;</button>
    </div>
    <div id="book-list"></div>
    <button class="btn-new-book" onclick="closeSidebar(); showNewBookForm();">+ নতুন বই যোগ করুন</button>
  </div>

  <!-- Full Page Content -->
  <div class="content" id="main-content">
    <div class="welcome-state">
      <div class="big-icon">📖</div>
      <h2>স্বাগতম!</h2>
      <p>উপরের ☰ মেনু থেকে একটি বই নির্বাচন করুন<br>অথবা নতুন বই যোগ করুন।</p>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let token = localStorage.getItem('admin_token') || '';
let books = [];
let selectedBookId = null;
let editingChapterId = null;
let chapters = [];

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}

async function apiFetch(url, opts = {}) {
  const res = await fetch(url, {
    headers: { 'Content-Type': 'application/json', 'X-Admin-Token': token },
    ...opts
  });
  if (!res.ok) throw new Error(await res.text());
  return res.json();
}

async function login() {
  const pw = document.getElementById('password-input').value;
  try {
    const result = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw })
    });
    if (!result.ok) throw new Error('wrong');
    const data = await result.json();
    token = data.token;
    localStorage.setItem('admin_token', token);
    showApp();
  } catch {
    document.getElementById('login-error').textContent = 'পাসওয়ার্ড ভুল হয়েছে।';
  }
}

function logout() {
  localStorage.removeItem('admin_token');
  location.reload();
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('main-app').style.display = 'block';
  await loadBooks();
}

async function loadBooks() {
  try {
    books = await apiFetch('/api/admin/books');
    renderBookList();
  } catch (e) {
    showToast('বই লোড করতে সমস্যা', 'error');
  }
}

function renderBookList() {
  const list = document.getElementById('book-list');
  list.innerHTML = '';
  if (books.length === 0) {
    list.innerHTML = '<div style="padding:20px;text-align:center;color:#aaa;font-size:13px;">কোনো বই নেই</div>';
    return;
  }
  books.forEach(book => {
    const el = document.createElement('div');
    el.className = 'book-item' + (book.id === selectedBookId ? ' active' : '');
    el.onclick = () => { closeSidebar(); selectBook(book.id); };
    el.innerHTML = `
      <div class="book-item-color" style="background:${book.cover_color}"></div>
      <div class="book-item-info">
        <div class="book-item-title">${escHtml(book.title)}</div>
        <div class="book-item-meta">${book.chapter_count} অধ্যায় ${book.published ? '' : '<span class="badge-draft">Draft</span>'}</div>
      </div>
    `;
    list.appendChild(el);
  });
}

async function selectBook(bookId) {
  selectedBookId = bookId;
  editingChapterId = null;
  renderBookList();
  const book = books.find(b => b.id === bookId);
  if (!book) return;
  document.getElementById('current-book-name').textContent = book.title;
  try {
    chapters = await apiFetch(`/api/admin/books/${bookId}/chapters`);
    renderBookEditor(book);
  } catch {
    showToast('অধ্যায় লোড করতে সমস্যা', 'error');
  }
}

function renderBookEditor(book) {
  const content = document.getElementById('main-content');
  content.innerHTML = `
    <div class="section-header">
      <h2>${escHtml(book.title)}</h2>
    </div>
    <div class="card">
      <h3>বইয়ের তথ্য</h3>
      <div class="form-grid">
        <div class="form-row">
          <label>বইয়ের নাম *</label>
          <input id="b-title" value="${escAttr(book.title)}" placeholder="বইয়ের নাম লিখুন">
        </div>
        <div class="form-row">
          <label>লেখকের নাম</label>
          <input id="b-author" value="${escAttr(book.author||'')}" placeholder="লেখকের নাম">
        </div>
      </div>
      <div class="form-row">
        <label>বর্ণনা</label>
        <textarea id="b-desc" placeholder="বইয়ের সংক্ষিপ্ত বর্ণনা...">${escHtml(book.description||'')}</textarea>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>কভারের রং</label>
          <div class="color-row">
            <input type="color" id="b-color" value="${book.cover_color||'#1E3A5F'}" oninput="updateCoverPreview()">
            <div class="color-preview" id="color-preview-bg" style="background:${book.cover_color||'#1E3A5F'}"></div>
            <span style="font-size:13px;color:var(--text2)">পটভূমির রং</span>
          </div>
        </div>
        <div class="form-row">
          <label>অ্যাকসেন্ট রং</label>
          <div class="color-row">
            <input type="color" id="b-accent" value="${book.cover_accent||'#C9A84C'}" oninput="updateCoverPreview()">
            <div class="color-preview" id="color-preview-acc" style="background:${book.cover_accent||'#C9A84C'}"></div>
            <span style="font-size:13px;color:var(--text2)">সাজসজ্জার রং</span>
          </div>
        </div>
      </div>
      <div class="form-row">
        <label>প্রকাশিত</label>
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="b-published" ${book.published ? 'checked' : ''}>
            <span class="toggle-slider"></span>
          </label>
          <span style="font-size:14px;color:var(--text2)">চালু থাকলে অ্যাপে দেখা যাবে</span>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-danger" onclick="confirmDeleteBook(${book.id})">বই মুছুন</button>
        <button class="btn-save" onclick="saveBook(${book.id})">পরিবর্তন সংরক্ষণ</button>
      </div>
    </div>

    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <h3 style="margin:0">অধ্যায়সমূহ (${chapters.length}টি)</h3>
        <button class="btn-save" style="padding:8px 18px;font-size:14px;" onclick="showNewChapterForm()">+ নতুন অধ্যায়</button>
      </div>
      <div id="chapter-list">
        ${renderChapterList()}
      </div>
    </div>

    <div id="chapter-editor-container"></div>
  `;
}

function renderChapterList() {
  if (chapters.length === 0) {
    return `<div class="empty-chapters">
      <div class="icon">📄</div>
      <p>এখনো কোনো অধ্যায় নেই। নতুন অধ্যায় যোগ করুন।</p>
    </div>`;
  }
  return `<div class="chapter-list">` + chapters.map((ch, i) => `
    <div class="chapter-row ${ch.id === editingChapterId ? 'active' : ''}" onclick="editChapter(${ch.id})">
      <div class="chapter-num">${i + 1}</div>
      <div class="chapter-title">${escHtml(ch.title)}</div>
      <div class="chapter-actions" onclick="event.stopPropagation()">
        <button class="btn-icon edit" onclick="editChapter(${ch.id})" title="সম্পাদনা">&#9998;</button>
        <button class="btn-icon del" onclick="confirmDeleteChapter(${ch.id})" title="মুছুন">&#128465;</button>
      </div>
    </div>
  `).join('') + `</div>`;
}

function editChapter(chapterId) {
  editingChapterId = chapterId;
  const ch = chapters.find(c => c.id === chapterId);
  if (!ch) return;
  document.getElementById('chapter-list').innerHTML = renderChapterList();
  const container = document.getElementById('chapter-editor-container');
  container.innerHTML = `
    <div class="chapter-editor">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <h3 style="margin:0;font-size:16px;">অধ্যায় সম্পাদনা</h3>
        <button class="btn-secondary" style="padding:7px 14px;font-size:13px;" onclick="closeChapterEditor()">বন্ধ করুন</button>
      </div>
      <div class="form-row">
        <label>অধ্যায়ের শিরোনাম</label>
        <input id="ch-title" value="${escAttr(ch.title)}" placeholder="অধ্যায়ের নাম">
      </div>
      <div class="form-row">
        <label>অধ্যায়ের ক্রম</label>
        <input id="ch-order" type="number" value="${ch.sort_order}" min="0">
      </div>
      <div class="form-row">
        <label>বিষয়বস্তু (লেখা)</label>
        <textarea id="ch-content" placeholder="এখানে অধ্যায়ের লেখা লিখুন...">${escHtml(ch.content||'')}</textarea>
      </div>
      <div class="form-actions">
        <button class="btn-save" onclick="saveChapter(${chapterId})">সংরক্ষণ করুন</button>
      </div>
    </div>
  `;
  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeChapterEditor() {
  editingChapterId = null;
  document.getElementById('chapter-list').innerHTML = renderChapterList();
  document.getElementById('chapter-editor-container').innerHTML = '';
}

function showNewChapterForm() {
  editingChapterId = null;
  document.getElementById('chapter-list').innerHTML = renderChapterList();
  const container = document.getElementById('chapter-editor-container');
  container.innerHTML = `
    <div class="chapter-editor">
      <h3 style="margin-bottom:16px;font-size:16px;">নতুন অধ্যায় যোগ করুন</h3>
      <div class="form-row">
        <label>অধ্যায়ের শিরোনাম *</label>
        <input id="ch-title" placeholder="অধ্যায়ের নাম">
      </div>
      <div class="form-row">
        <label>অধ্যায়ের ক্রম</label>
        <input id="ch-order" type="number" value="${chapters.length}" min="0">
      </div>
      <div class="form-row">
        <label>বিষয়বস্তু (লেখা)</label>
        <textarea id="ch-content" placeholder="এখানে অধ্যায়ের লেখা লিখুন..."></textarea>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="document.getElementById('chapter-editor-container').innerHTML=''">বাতিল</button>
        <button class="btn-save" onclick="createNewChapter()">যোগ করুন</button>
      </div>
    </div>
  `;
  container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function saveBook(bookId) {
  const data = {
    title: document.getElementById('b-title').value.trim(),
    description: document.getElementById('b-desc').value.trim(),
    author: document.getElementById('b-author').value.trim(),
    cover_color: document.getElementById('b-color').value,
    cover_accent: document.getElementById('b-accent').value,
    published: document.getElementById('b-published').checked,
    sort_order: 0
  };
  if (!data.title) { showToast('শিরোনাম আবশ্যক', 'error'); return; }
  try {
    await apiFetch(`/api/admin/books/${bookId}`, { method: 'PUT', body: JSON.stringify(data) });
    showToast('সংরক্ষিত হয়েছে!', 'success');
    await loadBooks();
    document.getElementById('current-book-name').textContent = data.title;
    const book = books.find(b => b.id === bookId);
    if (book) renderBookEditor(book);
  } catch { showToast('সংরক্ষণে সমস্যা', 'error'); }
}

async function saveChapter(chapterId) {
  const data = {
    title: document.getElementById('ch-title').value.trim(),
    content: document.getElementById('ch-content').value,
    sort_order: parseInt(document.getElementById('ch-order').value) || 0
  };
  if (!data.title) { showToast('শিরোনাম আবশ্যক', 'error'); return; }
  try {
    await apiFetch(`/api/admin/chapters/${chapterId}`, { method: 'PUT', body: JSON.stringify(data) });
    showToast('সংরক্ষিত হয়েছে!', 'success');
    chapters = await apiFetch(`/api/admin/books/${selectedBookId}/chapters`);
    document.getElementById('chapter-list').innerHTML = renderChapterList();
    editChapter(chapterId);
  } catch { showToast('সংরক্ষণে সমস্যা', 'error'); }
}

async function createNewChapter() {
  const data = {
    title: document.getElementById('ch-title').value.trim(),
    content: document.getElementById('ch-content').value,
    sort_order: parseInt(document.getElementById('ch-order').value) || 0
  };
  if (!data.title) { showToast('শিরোনাম আবশ্যক', 'error'); return; }
  try {
    await apiFetch(`/api/admin/books/${selectedBookId}/chapters`, { method: 'POST', body: JSON.stringify(data) });
    showToast('অধ্যায় যোগ হয়েছে!', 'success');
    chapters = await apiFetch(`/api/admin/books/${selectedBookId}/chapters`);
    const book = books.find(b => b.id === selectedBookId);
    await loadBooks();
    if (book) renderBookEditor(books.find(b => b.id === selectedBookId) || book);
  } catch { showToast('সমস্যা হয়েছে', 'error'); }
}

function showNewBookForm() {
  selectedBookId = null;
  editingChapterId = null;
  renderBookList();
  document.getElementById('current-book-name').textContent = '';
  const content = document.getElementById('main-content');
  content.innerHTML = `
    <div class="section-header">
      <h2>নতুন বই যোগ করুন</h2>
    </div>
    <div class="card">
      <div class="form-row">
        <label>বইয়ের নাম *</label>
        <input id="b-title" placeholder="বইয়ের নাম লিখুন">
      </div>
      <div class="form-row">
        <label>লেখকের নাম</label>
        <input id="b-author" placeholder="লেখকের নাম">
      </div>
      <div class="form-row">
        <label>বর্ণনা</label>
        <textarea id="b-desc" placeholder="বইয়ের সংক্ষিপ্ত বর্ণনা..."></textarea>
      </div>
      <div class="form-grid">
        <div class="form-row">
          <label>কভারের রং</label>
          <div class="color-row">
            <input type="color" id="b-color" value="#1E3A5F">
            <div class="color-preview" style="background:#1E3A5F"></div>
          </div>
        </div>
        <div class="form-row">
          <label>অ্যাকসেন্ট রং</label>
          <div class="color-row">
            <input type="color" id="b-accent" value="#C9A84C">
            <div class="color-preview" style="background:#C9A84C"></div>
          </div>
        </div>
      </div>
      <div class="form-row">
        <label>প্রকাশিত</label>
        <div class="toggle-row">
          <label class="toggle">
            <input type="checkbox" id="b-published" checked>
            <span class="toggle-slider"></span>
          </label>
          <span style="font-size:14px;color:var(--text2)">চালু থাকলে অ্যাপে দেখা যাবে</span>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn-secondary" onclick="showWelcome()">বাতিল</button>
        <button class="btn-save" onclick="createNewBook()">বই তৈরি করুন</button>
      </div>
    </div>
  `;
}

function showWelcome() {
  document.getElementById('main-content').innerHTML = `
    <div class="welcome-state">
      <div class="big-icon">📖</div>
      <h2>স্বাগতম!</h2>
      <p>উপরের ☰ মেনু থেকে একটি বই নির্বাচন করুন<br>অথবা নতুন বই যোগ করুন।</p>
    </div>`;
  document.getElementById('current-book-name').textContent = '';
}

async function createNewBook() {
  const data = {
    title: document.getElementById('b-title').value.trim(),
    description: document.getElementById('b-desc').value.trim(),
    author: document.getElementById('b-author').value.trim(),
    cover_color: document.getElementById('b-color').value,
    cover_accent: document.getElementById('b-accent').value,
    published: document.getElementById('b-published').checked,
    sort_order: books.length
  };
  if (!data.title) { showToast('শিরোনাম আবশ্যক', 'error'); return; }
  try {
    const book = await apiFetch('/api/admin/books', { method: 'POST', body: JSON.stringify(data) });
    showToast('বই তৈরি হয়েছে!', 'success');
    await loadBooks();
    selectBook(book.id);
  } catch { showToast('সমস্যা হয়েছে', 'error'); }
}

async function confirmDeleteBook(bookId) {
  if (!confirm('এই বই এবং সব অধ্যায় মুছে যাবে। আপনি কি নিশ্চিত?')) return;
  try {
    await apiFetch(`/api/admin/books/${bookId}`, { method: 'DELETE' });
    showToast('বই মুছে গেছে', 'success');
    selectedBookId = null;
    await loadBooks();
    showWelcome();
  } catch { showToast('মুছতে সমস্যা হয়েছে', 'error'); }
}

async function confirmDeleteChapter(chapterId) {
  if (!confirm('এই অধ্যায় মুছে যাবে। আপনি কি নিশ্চিত?')) return;
  try {
    await apiFetch(`/api/admin/chapters/${chapterId}`, { method: 'DELETE' });
    showToast('অধ্যায় মুছে গেছে', 'success');
    if (editingChapterId === chapterId) editingChapterId = null;
    chapters = await apiFetch(`/api/admin/books/${selectedBookId}/chapters`);
    await loadBooks();
    const book = books.find(b => b.id === selectedBookId);
    if (book) renderBookEditor(book);
  } catch { showToast('মুছতে সমস্যা', 'error'); }
}

function updateCoverPreview() {
  const color = document.getElementById('b-color').value;
  const accent = document.getElementById('b-accent').value;
  const bg = document.getElementById('color-preview-bg');
  const acc = document.getElementById('color-preview-acc');
  if (bg) bg.style.background = color;
  if (acc) acc.style.background = accent;
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast ${type} show`;
  setTimeout(() => t.className = 'toast', 3000);
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(str) {
  return String(str || '').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

if (token) { showApp(); }
else { document.getElementById('login-screen').style.display = 'flex'; }
</script>
</body>
</html>
